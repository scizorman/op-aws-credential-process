# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: 'CI'

on:
  pull_request:
  # TODO: Remove once the project stabilizes.
  push:
    branches:
      - 'main'

permissions: {}

concurrency:
  # TODO: Simplify to github.head_ref once push trigger is removed.
  group: '${{ github.workflow }}-${{ github.head_ref || github.ref }}'
  cancel-in-progress: true

jobs:
  go:
    runs-on: 'ubuntu-24.04'
    permissions:
      contents: 'read'
    timeout-minutes: 5
    steps:
      - uses: 'actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5' # v4
        with:
          persist-credentials: false
      - uses: 'cachix/install-nix-action@1ca7d21a94afc7c957383a2d217460d980de4934' # v31
      - run: |
          nix develop --command make ci
  nix:
    runs-on: '${{ matrix.os }}'
    permissions:
      contents: 'read'
    strategy:
      fail-fast: true
      matrix:
        os:
          - 'ubuntu-24.04'
          - 'ubuntu-24.04-arm'
          - 'macos-latest'
    timeout-minutes: 10
    steps:
      - uses: 'actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5' # v4
        with:
          persist-credentials: false
      - uses: 'cachix/install-nix-action@1ca7d21a94afc7c957383a2d217460d980de4934' # v31
      - run: |
          make derivation
